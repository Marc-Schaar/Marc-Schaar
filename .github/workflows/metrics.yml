name: Generate GitHub metrics SVG

on:
  schedule:
    # täglich um 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Kompakte Basis-Karte: Header, Aktivität, Community, Repos
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: Marc-Schaar
          template: classic
          filename: metrics.base.svg

          base: "header, activity, community, repositories"
          config_timezone: Europe/Berlin

          plugin_languages: no
          plugin_habits: no
          plugin_isocalendar: no

      # Separate, kompakte Sprachen-Karte (läuft nebenläufig als eigener Schritt)
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: Marc-Schaar
          template: classic
          filename: metrics.languages.svg

          base: ""
          config_timezone: Europe/Berlin

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage
